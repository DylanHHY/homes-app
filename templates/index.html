<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">{{ city_label }}Rental Analyzer</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card-hover: #334155;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  header { text-align: center; padding: 30px 0 20px; }
  header h1 { font-size: 28px; font-weight: 700; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); margin-top: 6px; font-size: 14px; }

  .lang-switcher {
    position: fixed; top: 12px; right: 16px; z-index: 50;
    display: flex; gap: 2px; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 3px; font-size: 12px;
  }
  .lang-btn {
    padding: 4px 10px; border: none; border-radius: 6px; cursor: pointer;
    background: transparent; color: var(--muted); font-weight: 600; font-size: 12px;
  }
  .lang-btn.active { background: var(--accent); color: #fff; }

  .budget-bar {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin: 16px 0 24px; padding: 12px; background: var(--card);
    border-radius: 10px; border: 1px solid var(--border);
  }
  .budget-item { text-align: center; }
  .budget-item .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .budget-item .value { font-size: 20px; font-weight: 700; color: var(--accent); }

  .input-section {
    background: var(--card); border-radius: 12px; padding: 20px;
    border: 1px solid var(--border); margin-bottom: 20px;
  }
  .input-section label { font-size: 14px; font-weight: 600; display: block; margin-bottom: 8px; }
  .input-section textarea {
    width: 100%; min-height: 100px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 12px;
    font-size: 13px; font-family: monospace; resize: vertical;
  }
  .input-section textarea:focus { outline: none; border-color: var(--accent); }
  .input-section textarea::placeholder { color: #475569; }

  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn {
    padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--card-hover); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: #475569; }

  .progress-bar {
    display: none; margin: 16px 0; padding: 14px; background: var(--card);
    border-radius: 10px; border: 1px solid var(--border);
  }
  .progress-bar.active { display: block; }
  .progress-track { height: 6px; background: var(--bg); border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
  .progress-text { font-size: 13px; color: var(--muted); }

  .results-header {
    display: flex; justify-content: space-between; align-items: center;
    margin: 24px 0 12px;
  }
  .results-header h2 { font-size: 18px; }
  .sort-btns { display: flex; gap: 6px; }
  .sort-btn {
    padding: 4px 12px; font-size: 12px; background: var(--card); color: var(--muted);
    border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
  }
  .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .cards { display: grid; gap: 14px; }

  .card {
    background: var(--card); border-radius: 12px; padding: 18px;
    border: 1px solid var(--border); transition: all 0.2s;
    display: grid; grid-template-columns: 50px 1fr auto; gap: 14px; align-items: start;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card.over-budget { border-left: 3px solid var(--red); opacity: 0.7; }
  .card.within-budget { border-left: 3px solid var(--green); }

  .rank {
    font-size: 24px; font-weight: 800; color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 10px; background: var(--bg);
  }
  .rank.top3 { color: var(--orange); }

  .card-body { min-width: 0; }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }

  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .tag-blue { background: #1e40af33; color: #60a5fa; }
  .tag-green { background: #16653433; color: #4ade80; }
  .tag-red { background: #7f1d1d33; color: #f87171; }
  .tag-orange { background: #78350f33; color: #fbbf24; }
  .tag-gray { background: #1e293b; color: var(--muted); }

  .card-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 6px; margin-top: 8px;
  }
  .card-stat { }
  .card-stat .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .card-stat .stat-value { font-size: 14px; font-weight: 600; }

  .card-right { text-align: right; min-width: 130px; }
  .monthly-total { font-size: 22px; font-weight: 800; }
  .monthly-total.ok { color: var(--green); }
  .monthly-total.ng { color: var(--red); }
  .remaining { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .score-badge {
    display: inline-block; margin-top: 6px; padding: 3px 10px;
    border-radius: 6px; font-size: 12px; font-weight: 700;
  }
  .score-high { background: #16653433; color: #4ade80; }
  .score-mid { background: #78350f33; color: #fbbf24; }
  .score-low { background: #7f1d1d33; color: #f87171; }

  .btn-delete {
    margin-top: 8px; padding: 2px 10px; background: none; border: 1px solid #7f1d1d55;
    color: var(--muted); border-radius: 4px; cursor: pointer; font-size: 11px;
  }
  .btn-delete:hover { color: var(--red); border-color: var(--red); }

  .batch-bar {
    display: none; position: sticky; top: 0; z-index: 100;
    background: #1e3a5f; border: 1px solid var(--accent); border-radius: 10px;
    padding: 10px 16px; margin-bottom: 12px;
    align-items: center; justify-content: space-between; gap: 10px;
  }
  .batch-bar.active { display: flex; }
  .batch-bar .batch-info { font-size: 14px; font-weight: 600; }
  .batch-bar .batch-actions { display: flex; gap: 8px; }
  .batch-bar .btn-batch {
    padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer;
  }
  .btn-batch-del { background: var(--red); color: #fff; }
  .btn-batch-del:hover { background: #dc2626; }
  .btn-batch-cancel { background: var(--card-hover); color: var(--text); }
  .btn-batch-cancel:hover { background: #475569; }
  .btn-batch-all { background: var(--accent); color: #fff; }
  .btn-batch-all:hover { background: #2563eb; }

  .card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
  .card-checkbox {
    position: absolute; top: 12px; left: 12px; width: 20px; height: 20px;
    accent-color: var(--accent); cursor: pointer; display: none;
  }
  .select-mode .card-checkbox { display: block; }
  .card-wrapper { position: relative; }

  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 24px; max-width: 450px; width: 90%;
  }
  .modal h3 { font-size: 16px; margin-bottom: 14px; }
  .modal-close { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; }
  .modal-close:hover { color: var(--text); }
  .cost-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .cost-table td { padding: 6px 0; border-bottom: 1px solid var(--border); }
  .cost-table td:last-child { text-align: right; font-weight: 600; }
  .cost-table tr.total td { border-top: 2px solid var(--accent); font-size: 15px; font-weight: 800; color: var(--accent); }
  .cost-table tr.section td { color: var(--muted); font-size: 11px; padding-top: 12px; border-bottom: none; }

  .set-label { display: block; color: var(--muted); font-size: 11px; margin-bottom: 3px; }
  .set-input {
    width: 100%; padding: 6px 8px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  .criteria-summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 8px; margin: 10px 0 20px; font-size: 12px; color: var(--muted);
  }
  .criteria-item { display: flex; gap: 6px; align-items: center; }
  .criteria-item .ci-label { font-weight: 600; color: var(--text); }

  @media (max-width: 768px) {
    .card { grid-template-columns: 1fr; }
    .rank { width: auto; height: auto; padding: 4px 10px; font-size: 14px; }
    .card-right { text-align: left; margin-top: 8px; }
  }

  /* Onboarding Wizard */
  .onboarding-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 300;
    align-items: center; justify-content: center;
  }
  .onboarding-overlay.active { display: flex; }
  .onboarding {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 0; max-width: 520px; width: 92%; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .ob-header { padding: 28px 28px 0; text-align: center; }
  .ob-icon { font-size: 48px; margin-bottom: 10px; }
  .ob-header h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .ob-header p { color: var(--muted); font-size: 13px; margin-bottom: 0; }
  .ob-progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin: 16px 28px 0; }
  .ob-progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 2px; transition: width 0.4s ease; }
  .ob-body { padding: 20px 28px 8px; }
  .ob-step { display: none; }
  .ob-step.active { display: block; }
  .ob-step h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .ob-step h3 .step-icon { font-size: 20px; }
  .ob-field { margin-bottom: 12px; }
  .ob-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; }
  .ob-field input, .ob-field select {
    width: 100%; padding: 10px 12px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; font-size: 14px; transition: border-color 0.2s;
  }
  .ob-field input:focus, .ob-field select:focus { outline: none; border-color: var(--accent); }
  .ob-field .ob-hint { font-size: 11px; color: #64748b; margin-top: 3px; }
  .ob-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ob-footer { display: flex; justify-content: space-between; align-items: center; padding: 16px 28px 24px; }
  .ob-footer .btn { min-width: 100px; }
  .ob-skip { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 6px 0; }
  .ob-skip:hover { color: var(--text); }
  .ob-lang-row { display: flex; gap: 6px; justify-content: center; margin: 16px 0 4px; }
  .ob-lang-btn {
    padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
    background: var(--bg); color: var(--muted); border: 2px solid var(--border); transition: all 0.2s;
  }
  .ob-lang-btn.active { border-color: var(--accent); color: var(--accent); }
  .ob-lang-btn:hover { border-color: var(--accent); }

  /* Detail modal */
  .detail-modal { max-width: 580px; max-height: 85vh; overflow-y: auto; }
  .detail-modal h3 { font-size: 17px; margin-bottom: 4px; }
  .detail-sub { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .detail-sub a { color: var(--accent); }
  .detail-section { margin-bottom: 16px; }
  .detail-section-title {
    font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; padding-bottom: 6px; margin-bottom: 8px;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px;
  }
  .detail-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px;
  }
  .detail-item { font-size: 13px; padding: 3px 0; }
  .detail-item .dl { color: var(--muted); font-size: 11px; }
  .detail-item .dv { font-weight: 600; }
  .detail-item.full { grid-column: 1 / -1; }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }
  .detail-facilities { font-size: 12px; color: var(--text); line-height: 1.8; }
  .detail-facilities span {
    display: inline-block; background: var(--bg); padding: 2px 8px; border-radius: 4px;
    margin: 2px 2px; font-size: 11px;
  }
  .detail-remarks {
    font-size: 12px; color: var(--muted); line-height: 1.6;
    background: var(--bg); padding: 10px 12px; border-radius: 8px;
    max-height: 120px; overflow-y: auto;
  }

  /* Commute searching pulse */
  .commute-pulse { animation: cpulse 1.2s ease-in-out infinite; }
  @keyframes cpulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Searchable Dropdown */
  .combo-wrap { position: relative; }
  .combo-wrap input { width: 100%; }
  .combo-list {
    display: none; position: absolute; top: 100%; left: 0; right: 0; z-index: 50;
    max-height: 220px; overflow-y: auto; background: var(--card); border: 1px solid var(--accent);
    border-radius: 0 0 8px 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .combo-list.open { display: block; }
  .combo-item {
    padding: 8px 12px; cursor: pointer; font-size: 13px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .combo-item:last-child { border-bottom: none; }
  .combo-item:hover, .combo-item.active { background: var(--accent); color: #fff; }
  .combo-item .combo-sub { font-size: 11px; color: var(--muted); }
  .combo-item:hover .combo-sub, .combo-item.active .combo-sub { color: rgba(255,255,255,0.7); }
  .combo-item .combo-region { font-size: 10px; opacity: 0.6; }
</style>
</head>
<body>

<div class="lang-switcher" id="langSwitcher">
  <button class="lang-btn" onclick="setLang('zh')">中文</button>
  <button class="lang-btn" onclick="setLang('ja')">日本語</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<div class="container">
  <header>
    <h1><span>HOMES</span> <span id="headerTitle"></span></h1>
    <p id="headerSub"></p>
  </header>

  <div class="budget-bar" id="budgetBar"></div>
  <div class="criteria-summary" id="criteriaSummary"></div>

  <button class="btn btn-secondary" style="width:100%;margin-bottom:16px;padding:8px;font-size:13px" onclick="toggleSettings();" id="btnSettings"></button>

  <div class="input-section" id="settingsPanel" style="display:none">
    <h3 style="margin-bottom:12px;font-size:15px" id="settingsTitle"></h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
      <div><label class="set-label" data-i18n="cfg_salary"></label><input type="number" id="cfgSalary" class="set-input"></div>
      <div><label class="set-label" data-i18n="cfg_expenses"></label><input type="number" id="cfgExpenses" class="set-input"></div>
      <div><label class="set-label" data-i18n="cfg_city"></label><div class="combo-wrap"><input type="text" id="cfgCityLabel" class="set-input" autocomplete="off"><div class="combo-list" id="cfgCityList"></div></div></div>
      <div><label class="set-label" data-i18n="cfg_station"></label><input type="text" id="cfgOfficeLabel" class="set-input"></div>
      <div><label class="set-label" data-i18n="cfg_address"></label><input type="text" id="cfgOfficeAddr" class="set-input"></div>
      <div><label class="set-label" data-i18n="cfg_commute"></label><input type="number" id="cfgCurrentCommute" class="set-input"></div>
      <div><label class="set-label" data-i18n="cfg_walk"></label><input type="number" id="cfgMaxWalk" class="set-input"></div>
      <div><label class="set-label" data-i18n="cfg_commute_mode"></label><select id="cfgCommuteMode" class="set-input"><option value="train"></option><option value="walk"></option><option value="bike"></option><option value="car"></option></select></div>
    </div>
    <h4 style="margin:14px 0 8px;font-size:13px;color:var(--muted)" data-i18n="cfg_weights"></h4>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px">
      <div><label class="set-label" data-i18n="w_corner"></label><input type="number" id="scCorner" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_south"></label><input type="number" id="scSouth" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_east"></label><input type="number" id="scEast" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_north"></label><input type="number" id="scNorth" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_floor5"></label><input type="number" id="scFloor5" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_floor3"></label><input type="number" id="scFloor3" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_area"></label><input type="number" id="scArea" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_room"></label><input type="number" id="scRoom" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_new"></label><input type="number" id="scNew" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_mid"></label><input type="number" id="scMid" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_budget"></label><input type="number" id="scBudget" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_immediate"></label><input type="number" id="scImmediate" class="set-input"></div>
      <div><label class="set-label" data-i18n="w_internet"></label><input type="number" id="scInternet" class="set-input"></div>
    </div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn btn-primary" onclick="saveSettings()" data-i18n="cfg_save"></button>
      <button class="btn btn-secondary" onclick="toggleSettings()" data-i18n="cancel"></button>
    </div>
  </div>

  <div class="input-section">
    <label data-i18n="url_label"></label>
    <textarea id="urlInput"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="btnScrape" onclick="startScrape()" data-i18n="btn_analyze"></button>
      <button class="btn btn-secondary" onclick="loadExisting()" data-i18n="btn_load"></button>
      <button class="btn btn-secondary" onclick="clearAll()" data-i18n="btn_clear"></button>
    </div>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-text" id="progressText"></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <h2><span data-i18n="results"></span> <span id="resultCount" style="color:var(--muted);font-size:14px"></span></h2>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="sort-btns">
          <button class="sort-btn active" onclick="sortBy('score')" data-i18n="sort_score"></button>
          <button class="sort-btn" onclick="sortBy('monthly_total')" data-i18n="sort_monthly"></button>
          <button class="sort-btn" onclick="sortBy('rent_num')" data-i18n="sort_rent"></button>
          <button class="sort-btn" onclick="sortBy('area_num')" data-i18n="sort_area"></button>
          <button class="sort-btn" onclick="sortBy('age')" data-i18n="sort_age"></button>
          <button class="sort-btn" onclick="sortBy('commute_min')" data-i18n="sort_commute"></button>
        </div>
        <button class="btn btn-primary" style="padding:4px 12px;font-size:12px" onclick="startCommute()" id="btnCommute" data-i18n="btn_commute"></button>
        <button class="btn btn-primary" style="padding:4px 12px;font-size:12px;background:var(--orange)" onclick="startTeiki()" id="btnTeiki" data-i18n="btn_teiki"></button>
        <button class="btn-secondary btn" style="padding:4px 12px;font-size:12px" onclick="toggleSelectMode();" id="btnSelectMode" data-i18n="btn_select"></button>
      </div>
    </div>

    <div class="batch-bar" id="batchBar">
      <div class="batch-info"><span data-i18n="selected"></span> <span id="selectedCount">0</span></div>
      <div class="batch-actions">

function getCityLabel(c) { return curLang === 'en' ? c.en : (curLang === 'zh' ? c.zh : c.ja); }
function getCitySub(c) { return curLang === 'en' ? c.ja : c.en; }

function initCombo(inputId, listId) {
  const input = document.getElementById(inputId);
  const list = document.getElementById(listId);
  let activeIdx = -1;

  function render(query) {
    const q = (query || '').toLowerCase();
    const matches = q ? CITIES.filter(c =>
      c.ja.includes(q) || c.en.toLowerCase().includes(q) || c.zh.includes(q) || c.region.includes(q)
    ) : CITIES;
    activeIdx = -1;
    list.innerHTML = matches.map((c, i) =>
      `<div class="combo-item" data-idx="${i}" data-ja="${c.ja}">
        <span>${getCityLabel(c)} <span class="combo-sub">${getCitySub(c)}</span></span>
        <span class="combo-region">${c.region}</span>
      </div>`
    ).join('');
    list.classList.toggle('open', matches.length > 0);

    list.querySelectorAll('.combo-item').forEach(item => {
      item.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input.value = item.dataset.ja;
        list.classList.remove('open');
        input.dispatchEvent(new Event('change'));
      });
    });
  }

  input.addEventListener('focus', () => render(input.value));
  input.addEventListener('input', () => render(input.value));
  input.addEventListener('blur', () => setTimeout(() => list.classList.remove('open'), 150));
  input.addEventListener('keydown', (e) => {
    const items = list.querySelectorAll('.combo-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, 0); }
    else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); items[activeIdx].dispatchEvent(new Event('mousedown')); return; }
    else return;
    items.forEach((it,i) => it.classList.toggle('active', i === activeIdx));
    if (activeIdx >= 0) items[activeIdx].scrollIntoView({ block: 'nearest' });
  });
}

async function startScrape() {
  const urls = document.getElementById('urlInput').value; if (!urls.trim()) return;
  document.getElementById('btnScrape').disabled = true;
  document.getElementById('progressBar').classList.add('active');
  document.getElementById('emptyState').style.display = 'none';
  const resp = await fetch('/api/scrape', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({urls}) });
  if (!resp.ok) { const err = await resp.json(); alert(err.error); document.getElementById('btnScrape').disabled = false; return; }
  pollProgress();
}

function pollProgress() {
  let idleCount = 0;
  pollTimer = setInterval(async () => {
    const resp = await fetch('/api/progress'), data = await resp.json();
    document.getElementById('progressText').textContent = data.message || t('preparing');
    if (data.total > 0) document.getElementById('progressFill').style.width = (data.current/data.total*100)+'%';
    if (data.status === 'idle') { idleCount++; if (idleCount>=3) { clearInterval(pollTimer); document.getElementById('btnScrape').disabled=false; document.getElementById('progressBar').classList.remove('active'); } return; }
    idleCount = 0;
    if (data.status==='done'||data.status==='error') {
      clearInterval(pollTimer); document.getElementById('btnScrape').disabled=false;
      if (data.status==='done'&&data.results) { currentResults=data.results; renderResults(); }
      setTimeout(()=>document.getElementById('progressBar').classList.remove('active'),2000);
    }
  }, 1000);
}

async function loadExisting() {
  const input = document.createElement('input'); input.type='file'; input.accept='.json';
  input.onchange = async (e) => {
    const text = await e.target.files[0].text(), properties = JSON.parse(text);
    const resp = await fetch('/api/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({properties}) });
    currentResults = await resp.json(); renderResults();
  }; input.click();
}

async function clearAll() {

async function deleteProperty(url) {

}

async function deleteSelected() {

function sortBy(key) {

  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  if (key==='score') currentResults.sort((a,b)=>(b.score||0)-(a.score||0));
  else if (key==='monthly_total'||key==='commute_min') currentResults.sort((a,b)=>(a[key]||999)-(b[key]||999));
  else if (key==='area_num') currentResults.sort((a,b)=>(b[key]||0)-(a[key]||0));
  else if (key==='age') currentResults.sort((a,b)=>(a[key]||999)-(b[key]||999));

  renderResults();

function commuteDisplay(r) {
  // Searching state
  if (r._commute_searching) return `<span style="color:var(--accent)" class="commute-pulse">${t('commute_searching')}</span>`;
  // Failed state
  if (r.commute_min === -1) return `<span style="color:var(--muted);font-size:11px">${t('commute_failed')}</span>`;
  // Not yet queried
  if (r.commute_min==null) return `<span style="color:var(--muted)">${t('not_queried')}</span>`;
  const min=r.commute_min, cls=min<=20?'color:var(--green)':min<=35?'color:var(--accent)':'color:var(--orange)';
  const addr=(r.address||'').replace('地図を見る','').trim();
  const origin=encodeURIComponent(addr||(r.best_station?r.best_station+'駅 '+(appConfig.city_label||''):''));
  const dest=encodeURIComponent(getOfficeAddr());
  // Use actual mode used for Maps link
  const modeUsed = r.commute_mode_used || {train:'transit',car:'car',bike:'bike',walk:'walk'}[appConfig.commute_mode||'train'] || 'transit';
  const gmModeMap = {transit:'3',car:'0',bike:'1',walk:'2'};
  const gmMode = gmModeMap[modeUsed] || '3';
  const mapsUrl=`https://www.google.com/maps/dir/${origin}/${dest}/data=!4m2!4m1!3e${gmMode}`;
  // Show mode icon if it differs from preferred
  const prefMode = {train:'transit',car:'car',bike:'bike',walk:'walk'}[appConfig.commute_mode||'train'];
  const modeIcons = {transit:'\u{1F683}',car:'\u{1F697}',bike:'\u{1F6B2}',walk:'\u{1F6B6}'};
  const modeLabel = modeUsed !== prefMode && modeIcons[modeUsed] ? `<br><span style="font-size:10px">${modeIcons[modeUsed]} ${modeUsed}</span>` : '';
  return `<a href="${mapsUrl}" target="_blank" onclick="event.stopPropagation()" style="${cls};font-weight:700;text-decoration:underline;text-underline-offset:3px;cursor:pointer">${min}${t('min_unit')}</a><br><span style="font-size:10px;color:var(--muted)">${t('door_to_door')}</span>${modeLabel}`;
}

function renderCard(r, rank) {
  if (r.error) return `<div class="card over-budget"><div class="rank">${rank}</div><div class="card-body"><div class="card-title"><a href="${r.url}" target="_blank">${r.label||t('fetch_failed')}</a></div><p style="color:var(--red);font-size:13px">${t('data_fail')}</p></div><div class="card-right"></div></div>`;

  const budgetClass=r.within_budget?'within-budget':'over-budget', totalClass=r.within_budget?'ok':'ng', rankClass=rank<=3?'top3':'';
  let tags='';
  if (r.is_corner) tags+=`<span class="tag tag-green">${t('corner_unit')}</span>`; else tags+=`<span class="tag tag-red">${t('non_corner')}</span>`;
  const ori=r.orientation||'-';
  if (ori==='南') tags+=`<span class="tag tag-green">${t('south')}</span>`;
  else if (['東','南東','南西'].includes(ori)) tags+=`<span class="tag tag-blue">${ori}</span>`;
  else if (ori==='北') tags+=`<span class="tag tag-red">${t('north')}</span>`;
  else if (ori==='西') tags+=`<span class="tag tag-orange">${t('west')}</span>`;
  else tags+=`<span class="tag tag-gray">${ori}</span>`;
  if (r.floor_num>=5) tags+=`<span class="tag tag-green">${r.floor_num}F</span>`; else tags+=`<span class="tag tag-gray">${r.floor_num||'?'}F</span>`;
  if (r.age<=10) tags+=`<span class="tag tag-green">築${r.age}年</span>`; else if (r.age<=20) tags+=`<span class="tag tag-blue">築${r.age}年</span>`; else tags+=`<span class="tag tag-orange">築${r.age}年</span>`;
  if (r.facilities&&r.facilities.includes('インターネット使用料無料')) tags+=`<span class="tag tag-blue">${t('net_free')}</span>`;
  if (r.movein==='即時') tags+=`<span class="tag tag-green">${t('move_now')}</span>`; else if (r.movein) tags+=`<span class="tag tag-orange">${(r.movein||'').substring(0,10)}</span>`;
  if (r.commute_min!=null) { const cm=r.commute_min; const modeUsed=r.commute_mode_used; const pref=appConfig.commute_mode||'train'; const modeIcon={transit:'&#x1F683;',car:'&#x1F697;',bike:'&#x1F6B2;',walk:'&#x1F6B6;'}; const isFallback=modeUsed&&modeUsed!=={train:'transit',car:'car',bike:'bike',walk:'walk'}[pref]; const mTag=isFallback&&modeIcon[modeUsed]?' '+modeIcon[modeUsed]:''; tags+=`<span class="tag ${cm<=20?'tag-green':cm<=35?'tag-blue':'tag-orange'}">${t('commute_x_min').replace('{x}',cm)}${mTag}</span>`; }
  if (r.missing_stations&&r.missing_stations.length>0&&r.best_teiki==null) tags+=`<span class="tag tag-red">${t('teiki_unknown')}</span>`;
  if (r.extra_monthly>0) tags+=`<span class="tag tag-orange">+${r.extra_monthly_text}</span>`;
  if (r.shikikin===0&&r.reikin===0) tags+=`<span class="tag tag-green">${t('zero_deposit')}</span>`;
  const fg=r.foreigner||''; if (fg.includes('可')) tags+=`<span class="tag tag-green">${t('foreigner_ok')}</span>`; else if (fg.includes('不可')) tags+=`<span class="tag tag-red">${t('foreigner_ng')}</span>`;

  let scoreCls='score-low'; if(r.score>=60) scoreCls='score-high'; else if(r.score>=40) scoreCls='score-mid';
  const teikiStr=r.best_teiki!=null?r.best_teiki.toLocaleString()+'円':'—';
  const stationInfo=r.best_station?r.best_station+'駅 '+r.best_walk+t('min_unit'):'—';
  const remainStr=r.within_budget?'+'+r.remaining.toLocaleString()+'円':r.remaining.toLocaleString()+'円';
  const checked=selectedUrls.has(r.url)?'checked':'', selectedCls=selectedUrls.has(r.url)?'selected':'';
  const eu=(r.url||'').replace(/'/g,"\\'");

  return `<div class="card-wrapper" onclick="if(selectMode){toggleSelect('${eu}')}">
    <input type="checkbox" class="card-checkbox" data-url="${r.url}" ${checked} onclick="event.stopPropagation(); onCheckboxChange('${eu}', this.checked)">
    <div class="card ${budgetClass} ${selectedCls}">
      <div class="rank ${rankClass}">${rank}</div>
      <div class="card-body">
        <div class="card-title"><a href="javascript:void(0)" onclick="event.stopPropagation(); showDetail(${rank-1})" style="cursor:pointer">${r.label||'?'}</a></div>
        <div class="tags">${tags}</div>
        <div class="card-grid">
          <div class="card-stat"><div class="stat-label">${t('rent_mgmt')}</div><div class="stat-value">${((r.rent_num||0)+(r.mgmt_num||0)).toLocaleString()}円</div></div>
          <div class="card-stat"><div class="stat-label">${t('teiki')}</div><div class="stat-value">${teikiStr}</div></div>
          <div class="card-stat"><div class="stat-label">${t('nearest')}</div><div class="stat-value">${stationInfo}</div></div>
          <div class="card-stat"><div class="stat-label">${t('commute_time')}</div><div class="stat-value">${commuteDisplay(r)}</div></div>
          <div class="card-stat"><div class="stat-label">${t('area')}</div><div class="stat-value">${r.area||'—'}</div></div>
          <div class="card-stat"><div class="stat-label">${t('layout')}</div><div class="stat-value">${(r.room_size||'?')}帖</div></div>
          <div class="card-stat"><div class="stat-label">${t('deposit_key')}</div><div class="stat-value">${r.deposit||'—'}</div></div>
          <div class="card-stat"><div class="stat-label">${t('initial_cost')}</div><div class="stat-value" style="cursor:pointer;text-decoration:underline;text-underline-offset:3px" onclick="event.stopPropagation(); showDetail(${rank-1})">${r.initial_cost?r.initial_cost.toLocaleString()+'円':'—'}</div></div>
        </div>
      </div>
      <div class="card-right">
        <div class="monthly-total ${totalClass}">${(r.monthly_total||0).toLocaleString()}<span style="font-size:12px">${t('per_month')}</span></div>
        <div class="remaining">${t('remaining_label')} ${remainStr}</div>
        <div class="score-badge ${scoreCls}">Score ${r.score||0}</div>
        <button class="btn-delete" onclick="event.stopPropagation(); deleteProperty('${eu}')">&#x2715;</button>
      </div>
    </div>
  </div>`;
}

function showDetail(index) {
  const r = currentResults[index]; if (!r) return;
  const fmt = (n) => n!=null&&n>=0 ? n.toLocaleString()+'円' : '—';
  const modeIcons = {transit:'\u{1F683}',car:'\u{1F697}',bike:'\u{1F6B2}',walk:'\u{1F6B6}'};
  const scoreCls = r.score>=60?'score-high':r.score>=40?'score-mid':'score-low';

  // Helper: render a detail item only if value exists
  const di = (label, val, full) => val ? `<div class="detail-item${full?' full':''}""><div class="dl">${label}</div><div class="dv">${val}</div></div>` : '';
  // Helper: render a section only if it has content
  const sec = (icon, titleKey, content) => content.trim() ? `<div class="detail-section"><div class="detail-section-title">${icon} ${t(titleKey)}</div>${content}</div>` : '';
  // Helper: facility chips
  const chips = (text) => text ? '<div class="detail-facilities">' + text.split(/[、，,]/).map(s=>s.trim()).filter(Boolean).map(s=>`<span>${s}</span>`).join('') + '</div>' : '';
  // Helper: surroundings list
  const surrList = (items) => items && items.length ? items.map(s=>`<div style="font-size:12px;padding:2px 0">• ${s}</div>`).join('') : '';

  document.getElementById('modalTitle').textContent = r.label || '?';

  let html = `<div class="detail-sub"><a href="${r.url}" target="_blank">${r.url}</a> &nbsp; <span class="score-badge ${scoreCls}" style="vertical-align:middle">Score ${r.score||0}</span></div>`;

  // ── Basic Info ──
  const stationDisplay = (r.station||'').replace(/\s+(徒歩)/g, '<br>$1');
  html += sec('\u{1F4CD}', 'sec_basic', `<div class="detail-grid">
    ${di(t('d_address'), (r.address||'').replace('地図を見る','').trim())}
    ${di(t('d_floor'), r.floor)}
    ${di(t('d_layout'), r.layout)}
    ${di(t('d_layout_detail'), r.layout_detail)}
    ${di(t('d_area'), r.area)}
    ${di(t('d_orientation'), r.orientation)}
    ${di(t('d_built'), r.built)}
    ${di(t('d_age'), r.age ? r.age+'年' : '')}
    ${di(t('d_position'), r.position)}
    ${di(t('d_status'), r.status)}
    ${di(t('d_movein'), r.movein)}
    ${di(t('d_foreigner'), r.foreigner)}
    ${di(t('d_conditions'), r.conditions, true)}
    ${di(t('d_station'), stationDisplay, true)}
  </div>`);

  // ── Cost ──
  html += sec('\u{1F4B0}', 'sec_cost', `<div class="detail-grid">
    ${di(t('d_rent'), r.rent)}
    ${di(t('d_mgmt'), r.mgmt)}
    ${di(t('deposit_key'), r.deposit)}
    ${di(t('d_teiki'), r.best_teiki!=null ? fmt(r.best_teiki)+' ('+r.best_station+'駅)' : '')}
    ${di(t('d_extra'), r.extra_monthly>0 ? r.extra_monthly_text : '')}
    ${di(t('d_monthly'), fmt(r.monthly_total))}
    ${di(t('d_remaining'), r.remaining!=null ? (r.remaining>=0?'+':'')+r.remaining.toLocaleString()+'円' : '')}
  </div>`);

  // ── Initial Cost ──
  html += sec('\u{1F3E6}', 'sec_initial', `<table class="cost-table">
    <tr><td>${t('deposit')} (${r.shikikin_text||'—'})</td><td>${fmt(r.shikikin)}</td></tr>
    <tr><td>${t('key_money')} (${r.reikin_text||'—'})</td><td>${fmt(r.reikin)}</td></tr>
    <tr><td>${t('guarantor_init')} (${r.hoshou_text||t('unknown')})</td><td>${r.hoshou_init?fmt(r.hoshou_init):t('need_confirm')}</td></tr>
    <tr><td>${t('agency_fee')} (${r.chukai_text||'—'})</td><td>${fmt(r.chukai)}</td></tr>
    <tr><td>${t('first_month')}</td><td>${fmt(r.first_month)}</td></tr>
    <tr><td>${t('fire_insurance')}</td><td>${r.hoken?fmt(r.hoken):'—'}</td></tr>
    <tr class="total"><td>${t('initial_total')}</td><td>${fmt(r.initial_cost)}</td></tr>
  </table>`);

  // ── Commute ──
  const commuteMode = r.commute_mode_used ? (modeIcons[r.commute_mode_used]||'') + ' ' + r.commute_mode_used : '';
  html += sec('\u{1F697}', 'sec_commute', `<div class="detail-grid">
    ${di(t('d_commute_time'), r.commute_min!=null&&r.commute_min>=0 ? r.commute_min+t('min_unit') : '')}
    ${di(t('d_commute_mode'), commuteMode)}
    ${di(t('d_commute_route'), r.commute_route, true)}
  </div>`);

  // ── Building & Facilities ──
  const bldg = r.building || {};
  let bldgContent = `<div class="detail-grid">
    ${di(t('d_structure'), bldg.structure)}
    ${di(t('d_parking'), bldg.parking)}
    ${di(t('d_units'), bldg.total_units)}
    ${di(t('d_contract'), bldg.contract_period)}
    ${di(t('d_guarantor'), bldg.guarantor, true)}
    ${di(t('d_insurance'), bldg.insurance_detail || bldg.insurance)}
    ${di(t('d_management'), bldg.management)}
    ${di(t('d_transaction'), bldg.transaction_type)}
  </div>`;
  if (r.facilities) bldgContent += `<div style="margin-top:8px"><div class="dl">${t('d_facilities')}</div>${chips(r.facilities)}</div>`;
  if (r.kitchen) bldgContent += `<div style="margin-top:6px"><div class="dl">${t('d_kitchen')}</div>${chips(r.kitchen)}</div>`;
  if (r.bath) bldgContent += `<div style="margin-top:6px"><div class="dl">${t('d_bath')}</div>${chips(r.bath)}</div>`;
  html += sec('\u{1F3E2}', 'sec_building', bldgContent);

  // ── Surroundings ──
  const surr = r.surroundings || {};
  const surrMap = {shopping:'d_shopping', medical:'d_medical', school:'d_school', public:'d_public', finance:'d_finance', other_facilities:'d_other_fac'};
  let surrContent = '';
  for (const [key, labelKey] of Object.entries(surrMap)) {
    if (surr[key] && surr[key].length) {
      surrContent += `<div style="margin-bottom:6px"><div class="dl">${t(labelKey)}</div>${surrList(surr[key])}</div>`;
    }
  }
  html += sec('\u{1F3EA}', 'sec_surround', surrContent);

  // ── Remarks ──
  html += sec('\u{1F4DD}', 'sec_remarks', r.remarks ? `<div class="detail-remarks">${r.remarks}</div>` : '');

  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
</script>
</body>
</html>
